<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>本一覧アプリ</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>本一覧アプリ</h1>
    <p>読みたい本や気になる本を探せる一覧ページです。</p>
  </header>

  <main>
    <section>
      <h2>本を検索</h2>
      <input type="text" id="searchInput" placeholder="本のタイトルを入力" />
    </section>

    <section>
      <h2>本一覧</h2>
    
      <article class="book-card">
        <h3 class="book-title">人を動かす</h3>
        <p class="book-author">著者: デール・カーネギー</p>
        <p class="book-genre">ジャンル: 自己啓発</p>
      </article>
    
      <article class="book-card">
        <h3 class="book-title">嫌われる勇気</h3>
        <p class="book-author">著者: 岸見一郎 / 古賀史健</p>
        <p class="book-genre">ジャンル: 心理学</p>
      </article>
    
      <article class="book-card">
        <h3 class="book-title">走れメロス</h3>
        <p class="book-author">著者: 太宰治</p>
        <p class="book-genre">ジャンル: 小説</p>
      </article>

      <article class="book-card">
        <h3 class="book-title">星の王子さま</h3>
        <p class="book-author">著者: サン＝テグジュペリ</p>
        <p class="book-genre">ジャンル: 小説</p>
      </article>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
